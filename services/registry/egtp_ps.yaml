# =====================================================
# PLAGENOR / IBTIKAR — Service Registry
# Service: EGTP-PS
# =====================================================

service_code: EGTP-PS
service_name: Custom DNA Primer Synthesis
category: Oligonucleotide Synthesis
type: Analysis
version: "1.0"

description: >
  Custom synthesis of DNA oligonucleotide primer pairs (Forward + Reverse)
  performed on a MerMade 4 phosphoramidite synthesizer. Primers are synthesized
  strictly according to sequences provided by the requester. The service includes
  standard butanol desalting purification and delivery at defined concentration.
  No primer design, validation, or sequence verification is performed.

# -----------------------------------------------------
# PARAMETERS
# -----------------------------------------------------
parameters:
  - name: primer_length_category
    label: Primer length category
    type: enum
    required: true
    options:
      - up_to_25_nt
      - from_26_to_30_nt
      - from_31_to_40_nt

  - name: delivery_format
    label: Delivery format
    type: enum
    required: true
    options:
      - 1_uM_in_water
      - Dried

  - name: purification_method
    label: Purification method
    type: enum
    required: true
    options:
      - Butanol desalting

# -----------------------------------------------------
# SAMPLE TABLE (ONE ROW = ONE PRIMER SET)
# -----------------------------------------------------
sample_table:
  enabled: true
  min_rows: 1

  columns:
    - name: primer_set_code
      label: Primer set identifier
      type: string
      required: true

    - name: forward_sequence
      label: Forward primer sequence (5’–3’)
      type: string
      required: true

    - name: reverse_sequence
      label: Reverse primer sequence (5’–3’)
      type: string
      required: true

# -----------------------------------------------------
# PRICING (SUPPORTED MODEL)
# -----------------------------------------------------
pricing:
  model: per_sample_table_row_with_multiplier
  currency: DZD

  base_price:
    non_pathogenic: 8500
    pathogenic: 8500

  multipliers:
    up_to_25_nt: 1
    from_26_to_30_nt: 1.3
    from_31_to_40_nt: 1.65

# -----------------------------------------------------
# REQUIRED BY REGISTRY LOADER
# -----------------------------------------------------
deliverables:
  - Forward and Reverse primers per set
  - Delivered at 1 µM in nuclease-free water or dried
  - OD260-based yield measurement

turnaround_time: >
  Typical turnaround time is 5–10 working days depending
  on synthesis workload and number of primer sets.

compliance:
  - Primer sequences must be provided in 5’–3’ orientation
  - Primer length must be between 18 and 40 nucleotides
  - The requester assumes responsibility for sequence correctness

override_policy:
  admin_override_allowed: true
  justification_required: true
  audit_required: true