# =====================================================
# PLAGENOR / IBTIKAR — Service Registry
# Service: EGTP-IMT
# =====================================================

service_code: EGTP-IMT
service_name: Identification microbienne via MALDI-TOF MS
category: Microbial Identification
type: Analysis
version: "1.2"

description: >
  Identification microbienne rapide et fiable des bactéries, levures
  et moisissures par spectrométrie de masse MALDI-TOF (profil protéique)
  sur plateforme MALDI Biotyper.

# -----------------------------------------------------
# REQUESTER FIELDS (DOCUMENTARY — NOT UI-DRIVEN)
# -----------------------------------------------------
# These fields MUST exist in request["requester"]
# They are collected by the requester UI, not rendered from registry
requester_fields:
  - name: full_name
    label: Nom et prénom
    type: string
    required: true

  - name: institution
    label: Université / École
    type: string
    required: true

  - name: laboratory
    label: Laboratoire
    type: string
    required: true

  - name: status
    label: Fonction / Poste
    type: string
    required: true

  - name: phone
    label: Numéro de téléphone
    type: string
    required: true

  - name: email
    label: Adresse e-mail
    type: string
    required: true

  - name: supervisor
    label: Directeur de recherche / Porteur de projet
    type: string
    required: true

# -----------------------------------------------------
# PARAMETERS (SERVICE FORM — REGISTRY-DRIVEN)
# -----------------------------------------------------
parameters:
  - name: analysis_frame
    label: Cadre de l’analyse
    type: enum
    required: true
    options:
      - Recherche académique
      - Projet institutionnel
      - Prestation de service

  - name: project_title
    label: Titre du projet
    type: string
    required: true

  - name: organism_type
    label: Type de microorganisme
    type: enum
    required: true
    options: [Bacterium, Yeast, Mould]

  - name: sample_origin
    label: Origine des isolats
    type: enum
    required: true
    options: [Environmental, Food, Hospital / Clinical]

  - name: pathogenic
    label: Isolat pathogène ou clinique
    type: boolean
    required: true

  - name: maldi_target_type
    label: Type de cible MALDI
    type: enum
    required: true
    options: [Reusable, Disposable]

  - name: analysis_mode
    label: Mode d’analyse
    type: enum
    required: true
    options: [Simple, Duplicate, Triplicate]

  - name: fresh_culture_available
    label: Fourniture de cultures fraîches
    type: boolean
    required: true

# -----------------------------------------------------
# SAMPLE TABLE (IBTIKAR — PER ISOLATE)
# -----------------------------------------------------
sample_table:
  enabled: true
  min_rows: 1

  columns:
    - name: sample_code
      label: Code isolat
      type: string
      required: true

    - name: organism_type
      label: Microorganisme
      type: enum
      required: true
      options: [Bacterium, Yeast, Mould]

    - name: sample_origin
      label: Origine
      type: enum
      required: true
      options: [Environmental, Food, Hospital / Clinical]

    - name: isolation_date
      label: Date d’isolement
      type: string
      required: true

    - name: culture_medium
      label: Milieu de culture
      type: string
      required: true

    - name: culture_conditions
      label: Conditions de culture
      type: string
      required: true

    - name: remarks
      label: Remarques
      type: string
      required: false

# -----------------------------------------------------
# PRICING (REGISTRY-DRIVEN)
# -----------------------------------------------------
pricing:
  model: per_sample_table_row_with_multiplier
  currency: DZD

  base_price:
    non_pathogenic: 2500
    pathogenic: 4000

  multipliers:
    Simple: 1
    Duplicate: 2
    Triplicate: 3

# -----------------------------------------------------
# IBTIKAR DOCX BINDING
# -----------------------------------------------------
ibtikar_binding:
  form_code: EGTP-IMT
  requires_sample_table: true

  analysis_mode_labels:
    Simple: "Analyse simple"
    Duplicate: "Analyse en duplicata"
    Triplicate: "Analyse en triplicata"

# -----------------------------------------------------
# REQUIRED BY REGISTRY LOADER
# -----------------------------------------------------
deliverables:
  - Rapport PDF par isolat incluant :
      - Nom de l’organisme identifié
      - Score de confiance
      - Commentaire d’interprétation

turnaround_time: >
  Les isolats conformes sont traités dès réception.

compliance:
  - Cultures fraîches obligatoires
  - Déclaration de risque biologique si applicable

override_policy:
  admin_override_allowed: true
  justification_required: true
  audit_required: true