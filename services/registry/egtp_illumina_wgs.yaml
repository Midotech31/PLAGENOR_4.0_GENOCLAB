# =====================================================
# PLAGENOR / IBTIKAR — Service Registry
# Service: EGTP-Illumina-Microbial-WGS
# =====================================================

service_code: EGTP-Illumina-Microbial-WGS
service_name: Microbial Whole Genome Sequencing (Illumina)
category: High-Throughput Sequencing
type: Analysis
version: "1.0"

description: >
  Whole Genome Sequencing (WGS) of microbial isolates using Illumina
  high-throughput sequencing technology. The service includes genomic DNA
  extraction from pure cultures, nucleic acid quality control, Illumina
  library preparation, paired-end sequencing, and delivery of raw sequencing
  data.

# -----------------------------------------------------
# PARAMETERS
# -----------------------------------------------------
parameters:
  - name: organism_type
    label: Type of microorganism
    type: enum
    required: true
    options:
      - Bacterium
      - Yeast
      - Mould

  - name: sample_origin
    label: Source of isolation
    type: enum
    required: true
    options:
      - Environmental
      - Food
      - Hospital / Clinical

  - name: pathogenic
    label: Pathogenic isolate
    type: boolean
    required: true

  - name: sequencing_depth
    label: Sequencing depth
    type: enum
    required: true
    options:
      - Standard
      - High

# -----------------------------------------------------
# SAMPLE TABLE
# -----------------------------------------------------
sample_table:
  enabled: true
  min_rows: 1

  columns:
    - name: sample_code
      type: string
      required: true

    - name: organism_type
      type: enum
      required: true
      options:
        - Bacterium
        - Yeast
        - Mould

    - name: sample_origin
      type: enum
      required: true
      options:
        - Environmental
        - Food
        - Hospital / Clinical

# -----------------------------------------------------
# PRICING (SUPPORTED MODEL)
# -----------------------------------------------------
pricing:
  model: per_sample_table_row_with_multiplier
  currency: DZD

  base_price:
    non_pathogenic: 95000
    pathogenic: 95000

  multipliers:
    Standard: 1
    High: 1.32   # 125000 / 95000 ≈ 1.32

# -----------------------------------------------------
# REQUIRED BY REGISTRY LOADER
# -----------------------------------------------------
deliverables:
  - Paired-end FASTQ files
  - Basic sequencing run quality metrics

turnaround_time: >
  Typical turnaround time is 4 to 6 weeks from acceptance of compliant samples.

compliance:
  - Fresh, pure cultures are mandatory.
  - Biosafety declaration required for clinical or pathogenic isolates.
  - Transport must comply with PLAGENOR biosafety rules.

override_policy:
  admin_override_allowed: true
  justification_required: true
  audit_required: true