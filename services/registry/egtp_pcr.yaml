# =====================================================
# PLAGENOR / IBTIKAR — Service Registry
# Service: EGTP-PCR
# =====================================================

service_code: EGTP-PCR
service_name: PCR (Polymerase Chain Reaction)
category: Molecular Biology
type: Analysis
version: "1.0"

description: >
  PCR (Polymerase Chain Reaction) is a molecular biology technique used to
  amplify specific DNA sequences. The service includes reaction setup using
  requester-supplied primers, amplification on a gradient thermal cycler,
  and verification by agarose gel electrophoresis.

# -----------------------------------------------------
# PARAMETERS
# -----------------------------------------------------
parameters:
  - name: dna_origin
    label: Origin of DNA
    type: enum
    required: true
    options:
      - Environmental
      - Food
      - Hospital / Clinical

  - name: dna_type
    label: Type of DNA
    type: enum
    required: true
    options:
      - Plasmidic
      - Chromosomal
      - Genomic

  - name: pcr_kit
    label: PCR kit
    type: enum
    required: true
    options:
      - Standard Taq
      - High-Fidelity
      - GC-Rich

  - name: qc_level
    label: Quality control level
    type: enum
    required: true
    options:
      - None
      - Gel
      - ScanDrop + Gel

  - name: product_recovery
    label: PCR product recovery
    type: boolean
    required: true

# -----------------------------------------------------
# SAMPLE TABLE (ONE ROW = ONE PCR REACTION)
# -----------------------------------------------------
sample_table:
  enabled: true
  min_rows: 1

  columns:
    - name: sample_code
      type: string
      required: true

    - name: target_gene
      type: string
      required: true

# -----------------------------------------------------
# PRICING (SUPPORTED MODEL)
# -----------------------------------------------------
pricing:
  model: per_sample_table_row_with_multiplier
  currency: DZD

  base_price:
    non_pathogenic: 1500
    pathogenic: 1500

  multipliers:
    None: 1
    Gel: 1.3
    ScanDrop + Gel: 1.6

# -----------------------------------------------------
# REQUIRED BY REGISTRY LOADER
# -----------------------------------------------------
deliverables:
  - Gel image confirming amplification
  - Optional recovered PCR product
  - QC results if applicable

turnaround_time: >
  Standard turnaround time is up to 10 working days from receipt
  of compliant DNA samples and primers.

compliance:
  - Minimum of 10 µL DNA per reaction at 50–300 ng required
  - Forward and reverse primers (10 µM) must be supplied
  - Biosafety declaration required for clinical DNA

override_policy:
  admin_override_allowed: true
  justification_required: true
  audit_required: true
